<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>NYC Taxi Urban Mobility Explorer — Group 10</title>
    <style>
      :root {
        --yellow: #f6c90e;
        --yellow-d: #d4a90a;
        --dark: #1a1a2e;
        --dark2: #16213e;
        --cream: #fdfaf3;
        --text: #2d3748;
        --text2: #6b6558;
        --line: #e3dcc8;
      }

      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html,
      body {
        background: var(--cream);
        color: var(--text);
        font-family: "Segoe UI", system-ui, sans-serif;
        height: 100%;
      }

      body {
        background-image: radial-gradient(
          circle at 1px 1px,
          rgba(26, 26, 46, 0.035) 1px,
          transparent 0
        );
        background-size: 22px 22px;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      /* ── Center stage ─────────────────────────────────────────────────────── */
      .stage {
        flex: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 24px clamp(20px, 6vw, 48px);
        gap: clamp(28px, 5vh, 48px);
      }

      .hero h1 {
        font-size: clamp(1.9rem, 7vw, 5rem);
        font-weight: 800;
        line-height: 1.05;
        letter-spacing: -0.01em;
        color: var(--dark);
      }
      .hero h1 .accent {
        color: var(--yellow-d);
      }
      .hero h1 .break-mobile {
        display: none;
      }

      @media (max-width: 380px) {
        .hero h1 {
          line-height: 1.1;
        }
        .hero h1 .break-mobile {
          display: block;
        }
        .hero h1 .break-desktop {
          display: none;
        }
      }

      .hero-trip-count {
        margin-top: clamp(18px, 3vh, 28px);
        font-family: "Courier New", monospace;
        font-weight: 700;
        font-size: clamp(1.3rem, 4vw, 2rem);
        color: var(--dark2);
        border-top: 1px solid var(--line);
        border-bottom: 1px solid var(--line);
        padding: 12px 0;
        display: inline-flex;
        align-items: baseline;
        gap: 10px;
      }
      .hero-trip-count .num {
        color: var(--yellow-d);
        font-size: 1.15em;
      }
      .hero-trip-count .label {
        font-family: "Segoe UI", system-ui, sans-serif;
        font-weight: 500;
        font-size: 0.6em;
        color: var(--text2);
        text-align: left;
      }

      .stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 1px;
        background: var(--line);
        border: 1px solid var(--line);
        border-radius: 14px;
        overflow: hidden;
        width: 100%;
        max-width: 620px;
      }
      .stat {
        background: var(--cream);
        padding: clamp(16px, 3vw, 26px) clamp(10px, 3vw, 24px);
      }
      .stat .stat-val {
        font-family: "Courier New", monospace;
        font-weight: 700;
        font-size: clamp(1.2rem, 3vw, 1.6rem);
        color: var(--dark);
        margin-bottom: 4px;
      }
      .stat .stat-lbl {
        font-size: clamp(0.66rem, 1.6vw, 0.76rem);
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }

      .cta {
        display: inline-flex;
        align-items: center;
        gap: 8px;
        background: var(--dark);
        color: var(--yellow);
        text-decoration: none;
        font-weight: 600;
        font-size: clamp(0.92rem, 2.2vw, 1rem);
        padding: 15px 30px;
        border-radius: 30px;
        transition:
          transform 0.15s ease,
          box-shadow 0.15s ease;
        box-shadow: 0 4px 14px rgba(26, 26, 46, 0.18);
      }
      .cta:hover {
        transform: translateY(-1px);
        box-shadow: 0 6px 18px rgba(26, 26, 46, 0.24);
      }
      .cta:active {
        transform: translateY(0);
      }
      .cta .arrow {
        transition: transform 0.15s ease;
      }
      .cta:hover .arrow {
        transform: translateX(3px);
      }

      .foot {
        text-align: center;
        padding: 20px;
        font-size: clamp(0.72rem, 1.8vw, 0.8rem);
        color: var(--text2);
      }

      @media (max-width: 480px) {
        .stats {
          grid-template-columns: 1fr;
        }
        .stat {
          border-bottom: 1px solid var(--line);
        }
      }

      @media (prefers-reduced-motion: reduce) {
        .cta,
        .cta .arrow {
          transition: none;
        }
      }
    </style>
  </head>
  <body>
    <div class="stage">
      <div class="hero">
        <h1>
          How a city<br class="break-desktop" /><span class="break-mobile">
          </span
          >moves<br />by <span class="accent">taxi.</span>
        </h1>
        <div class="hero-trip-count">
          <span class="num" id="hero-trips">—</span>
          <span class="label">real NYC&nbsp;trips<br />cleaned</span>
        </div>
      </div>

      <div class="stats">
        <div class="stat">
          <div class="stat-val" id="stat-revenue">—</div>
          <div class="stat-lbl">Total fares</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-fare">—</div>
          <div class="stat-lbl">Avg fare</div>
        </div>
        <div class="stat">
          <div class="stat-val" id="stat-airport">—</div>
          <div class="stat-lbl">Airport trips</div>
        </div>
      </div>

      <a class="cta" href="dashboard.html"
        >Enter the dashboard <span class="arrow">→</span></a
      >
    </div>

    <div class="foot">Group 10 · ALU Software Engineering</div>

    <script>
      const API = "http://127.0.0.1:5000/api";

      async function load() {
        try {
          const res = await fetch(`${API}/summary`);
          if (!res.ok) throw new Error("API not reachable");
          const s = await res.json();
          document.getElementById("hero-trips").textContent =
            s.total_trips.toLocaleString();
          document.getElementById("stat-revenue").textContent =
            `$${(s.total_revenue / 1e6).toFixed(1)}M`;
          document.getElementById("stat-fare").textContent =
            `$${s.avg_fare.toFixed(2)}`;
          document.getElementById("stat-airport").textContent =
            s.airport_trips.toLocaleString();
        } catch (e) {
          document.getElementById("hero-trips").textContent = "—";
          document.getElementById("stat-revenue").textContent = "—";
          document.getElementById("stat-fare").textContent = "—";
          document.getElementById("stat-airport").textContent = "—";
        }
      }

      load();
    </script>
  </body>
</html>
